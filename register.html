<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        label{
            display: inline-block;
            width: 120px;
        }
    </style>
</head>
<body>
    <fieldset id="fldset">
        <legend>Registration</legend>
        
        <label for="customerid">Customer ID</label>
        <input type="text" id="customerid" required
        placeholder="Customer ID" /> <br>
    

        
        <label for="firstname">FirstName</label>
        <input type="text" id="firstname" required
        placeholder="First Name" /> <br>
         
        <label for="surname">Surname</label>
        <input type="text" id="surname" required
        placeholder="Surname" /> <br>
    
        <label for="gender">Gender</label>
        <select id="gender" onchange="alert(this.value)">
        <!-- <option>select</option>
             <option>Female</option>
             <option>Male</option>
        -->
            <option value="O"> select </option>
            <option value="F"> Female</option>
            <option value="M"> Male</option>
        </select> <br>
        
        <label for="dob">DOB</label>
        <input type="date" id="dob" required
        placeholder="DOB" /> <br>
        
        <label for="email">Email</label>
        <input type="email" id="email" required
        placeholder="Email Address" /> <br>

        <Label>Marital Staatus:</Label>
        <label for="single">Single</label>
        <input type="radio" id="single" name="status" value="s" />
        <label for="married">Married</label>
        <input type="radio" id="married" name="status" value="m" />
        <label for="widow">Widow</label>
        <input type="radio" id="widow" name="status" value="W" />
        <label for="divorced">Divorced</label>
        <input type="radio" id="divorced" name="status" value="D" /> <br>

        <label for="cellno"> Cell Number: </label>
        <input type="tel" id="cellno" required
          placeholder="71 000 000" /> <br>

          <label for="password"> Password </label>
          <input type="password" id="Password" required/>  </br>

          <label for="dateregistered"> Date Registered</label>
          <input type="date" id="dateregistered" required /> <br>

          <label for="timeregistered"> Time Registered</label>
          <input type="time" id="timeregistered" required/> <br>

          <label for="country"> Country</label>
          <select id="country">
          </select><br>

          <label> Modules:</label>
          <label for="cms">CMS</label>
          <input type="checkbox" id="cms" name="module" /> 
          <label for="wmd">WMD</label>
          <input type="checkbox" id="wmd" name="module" />
          <label for="c#">C#</label>
          <input type="checkbox" id="c#" name="module" />

        

    </fieldset>
</body>
<script type="module">

    import data from "./countries.js" with {type: "json"};
    console.log(data);
    var cbo=document .getElementld("country");
    var cbo=document.querySelector("#country");
    //adding data
    for(var k=0; k<data.length; k++){
        var item=data[k];
        var option=document.createOption("");    
        option.value=item.code;
        option.textContent=item.countryname;  
        cbo.appendChild(option);
    }

    
</script>
</html>
